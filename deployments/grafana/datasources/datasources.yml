apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false

  - name: Infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://api:8080
    isDefault: false
    editable: false
