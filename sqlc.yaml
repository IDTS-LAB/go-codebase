version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/todo/infrastructure/persistence/queries/todo.sql"
    schema: "migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/todo/infrastructure/persistence/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "jsonb"
            go_type:
              type: "[]byte"
            nullable: true

