server:
  port: 8080
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 120

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: go_codebase
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

nats:
  url: nats://localhost:4222

jwt:
  secret: your-secret-key-change-in-production
  expiration: 3600

log:
  level: info
  format: json

telemetry:
  service_name: go-codebase
  exporter_endpoint: http://localhost:4318
  sample_rate: 1.0

asynq:
  redis_addr: localhost:6379
