# =============================================================================
# Application
# =============================================================================
app_env: development

# =============================================================================
# Server
# =============================================================================
server:
  port: 8080
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 120
  max_request_body_size: 10485760

# =============================================================================
# Database (PostgreSQL)
# =============================================================================
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: go_codebase
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

# =============================================================================
# Redis
# =============================================================================
redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

# =============================================================================
# NATS
# =============================================================================
nats:
  url: nats://localhost:4222

# =============================================================================
# Authentication & Security
# =============================================================================
jwt:
  secret: your-secret-key-change-in-production
  expiration: 3600

auth:
  max_login_attempts: 5
  lockout_duration: 900
  token_denylist: true

cors:
  allowed_origins: ["http://localhost:3000", "http://localhost:8080"]
  allowed_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allowed_headers: ["Accept", "Authorization", "Content-Type", "X-Request-ID"]
  allow_credentials: true
  max_age: 300

# =============================================================================
# Rate Limiting
# =============================================================================
rate_limit:
  requests: 100
  window: 60

# =============================================================================
# Idempotency
# =============================================================================
idempotency:
  enabled: false
  ttl: 86400

# =============================================================================
# Observability (Logging & Tracing)
# =============================================================================
log:
  level: info
  format: json

telemetry:
  service_name: go-codebase
  exporter_endpoint: http://localhost:4318
  sample_rate: 1.0

# =============================================================================
# Background Jobs (Asynq)
# =============================================================================
asynq:
  redis_addr: localhost:6379

# =============================================================================
# Email Service
# =============================================================================
email:
  provider: console
  from: "no-reply@example.com"
  from_name: "App"
  frontend_url: "http://localhost:3000"
  smtp:
    host: localhost
    port: 587
    username: ""
    password: ""
    use_tls: true
  sendgrid:
    api_key: ""
