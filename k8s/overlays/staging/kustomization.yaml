apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: go-codebase-staging

resources:
  - ../../base

namePrefix: staging-

replicas:
  - name: go-codebase
    count: 1

images:
  - name: ghcr.io/idts-lab/go-codebase
    newTag: main

patches:
  - target:
      kind: Ingress
      name: go-codebase
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.go-codebase.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.go-codebase.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: staging-go-codebase-tls
